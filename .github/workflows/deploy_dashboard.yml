name: Deploy Trading Dashboard

on:
  push:
    branches: [main]
    paths:
      - 'trade_logs/**'
      - 'data/**'
      - 'analytics/dashboard_generator.py'
  workflow_dispatch:   # Allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install openpyxl python-dotenv

      - name: Generate dashboard
        run: python -m analytics.dashboard_generator
        env:
          PAPER_TRADING_MODE: "true"

      - name: Commit and push updated dashboard
        run: |
          git config user.name  "TradingBot[bot]"
          git config user.email "tradingbot@noreply.github.com"
          git add docs/index.html docs/.nojekyll
          git diff --staged --quiet || git commit -m "chore: update dashboard [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
